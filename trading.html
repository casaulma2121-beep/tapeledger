 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger - Advanced Trading Canvas</title>
    <link rel="icon" href="data:,">

    <style>
        :root {
            --bg: #0c0d12;
            --card-bg: #14161f;
            --input-bg: #1a1d29;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #26a69a;
            --accent-red: #ff5a5f;
            --gold: #ffaa00;
            --border: #23263a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 240px 1fr 340px;
            gap: 20px;
            max-width: 1500px;
            width: 100%;
        }

        /* Sidebar Navigation Column */
        .sidebar-left {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-brand {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            padding-left: 8px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--input-bg);
            color: var(--text);
        }

        /* Central Workspace Area */
        .workspace-center {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .asset-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .tab-btn.active {
            background-color: var(--accent-red);
            color: #ffffff;
            border-color: var(--accent-red);
        }

        .stat-display-group {
            display: flex;
            gap: 20px;
        }

        .stat-val-box {
            text-align: right;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-num {
            font-weight: 700;
            font-size: 16px;
        }

        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            height: 400px;
            box-sizing: border-box;
        }

        #chart-canvas {
            width: 100%;
            height: 100%;
            background-color: #0e1017;
            border-radius: 8px;
        }

        .tape-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 12px;
        }

        .tape-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 10px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .tape-table td {
            padding: 10px 0;
            border-bottom: 1px solid #1a1d29;
        }

        /* Right Control Panel */
        .strat-side {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .group input, .group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .group input:focus {
            border-color: var(--accent-red);
        }

        .exec-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn-trade {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .btn-trade:hover {
            opacity: 0.9;
        }

        .btn-buy { background-color: var(--accent-green); color: #0c0d12; font-weight: 800; }
        .btn-sell { background-color: var(--accent-red); color: #0c0d12; font-weight: 800; }
        
        /* Layout utility styles */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar Navigation Menu -->
        <div class="sidebar-left">
            <div class="sidebar-brand">TapeLedger</div>
            <div class="nav-links">
                <button class="nav-item active" id="nav-radar" onclick="window.switchTab('radar')">Live Radar</button>
                <button class="nav-item" id="nav-vault" onclick="window.switchTab('vault')">Vault Ledger</button>
                <button class="nav-item" id="nav-coach" onclick="window.switchTab('coach')">Discipline Coach</button>
            </div>
        </div>

        <!-- Central Workspace Node Stack Area -->
        <div class="workspace-center">
            
            <!-- PANEL 1: LIVE RADAR CANVAS STACK -->
            <div id="panel-radar" class="tab-panel active">
                <div class="top-navbar" style="margin-bottom: 20px;">
                    <div class="asset-tabs">
                        <button class="tab-btn" id="b-gold" onclick="window.sw('XAUUSD', 2150.40, 'Gold Spot')">XAUUSD</button>
                        <button class="tab-btn active" id="b-btc" onclick="window.sw('BTCUSD', 96420.00, 'Bitcoin Index')">BTCUSD</button>
                        <button class="tab-btn" id="b-oil" onclick="window.sw('USOUSD', 78.25, 'Crude Oil')">USOUSD</button>
                    </div>
                    <div class="stat-display-group">
                        <div class="stat-val-box">
                            <div class="stat-lbl" id="t-lbl">Bitcoin Index</div>
                            <div class="stat-num" id="t-pr" style="color: var(--gold);">$96,420.00</div>
                        </div>
                        <div class="stat-val-box">
                            <div class="stat-lbl">Win Ratio</div>
                            <div class="stat-num" style="color: var(--accent-green);">100%</div>
                        </div>
                    </div>
                </div>

                <div class="chart-wrapper" style="margin-bottom: 20px;">
                    <div id="chart-canvas"></div>
                </div>
                
                <div class="tape-wrapper">
                    <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: bold;">Live Transaction Tape</div>
                    <table class="tape-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Asset</th>
                                <th>Action</th>
                                <th>Price</th>
                                <th>Size</th>
                            </tr>
                        </thead>
                        <tbody id="t-body">
                            <!-- Populates dynamically via renderTables() -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PANEL 2: VAULT BALANCE ACCOUNT STATEMENT REVIEWS -->
            <div id="panel-vault" class="tab-panel">
                <div class="tape-wrapper" style="min-height: 500px;">
                    <div style="font-size: 13px; color: var(--gold); font-weight: bold; margin-bottom: 15px;">💼 VAULT BALANCES LEDGER AUDITS RECORD</div>
                    <table class="tape-table">
                        <thead>
                            <tr>
                                <th>Trade ID</th>
                                <th>Asset</th>
