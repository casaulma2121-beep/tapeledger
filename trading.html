 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger Workspace</title>
    <style>
        :root {
            --bg-dark: #0c0c0e;
            --sidebar-bg: #131419;
            --accent-gold: #d4af37;
            --accent-red: #ce380f;
            --accent-green: #1c752b;
            --text-main: #afbada;
            --card-bg: #1d2032;
            --border-color: #23263a;
        }
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
        }
        .logo-container {
            font-weight: bold;
            font-size: 20px;
            color: var(--accent-gold);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            transition: background 0.2s;
        }
        .nav-item.active, .nav-item:hover {
            background-color: var(--card-bg);
            color: #fff;
        }
        .sandbox-badge {
            font-size: 10px;
            background-color: #1c1c1f;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: auto;
            text-align: center;
            border: 1px solid #2d3340;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            overflow-y: auto;
        }
        .top-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            min-height: 60px;
        }
        .asset-switches {
            display: flex;
            gap: 8px;
        }
        .asset-btn {
            background-color: #1c1c1f;
            border: 1px solid #2d3340;
            color: #fff;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .asset-btn.active {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
        }
        .metrics-panel {
            display: flex;
            gap: 15px;
        }
        .metric-card {
            background-color: var(--card-bg);
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 110px;
            border: 1px solid var(--border-color);
        }
        .metric-val {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .metric-val.gold { color: var(--accent-gold); }
        .metric-val.green { color: var(--accent-green); }
        .metric-val.white { color: #fff; }
        .metric-lbl {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        .grid-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        .chart-window {
            flex: 2;
            background-color: #131419;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .strategy-sidebar {
            flex: 1;
            background-color: var(--sidebar-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-sizing: border-box;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .form-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-gold);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .macro-group {
            margin-bottom: 15px;
        }
        .macro-label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #fff;
        }
        .macro-select, .macro-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
        }
        .execution-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-buy { background-color: var(--accent-green); }
        .btn-sell { background-color: var(--accent-red); }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            font-size: 11px;
            color: #616e88;
            text-transform: uppercase;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #1c1e26;
            font-size: 13px;
            font-family: monospace;
            color: #fff;
        }
        .scroll-box {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #1c1e26;
            border-radius: 6px;
            background: #0c0d10;
        }
        .green-text { color: #26c281; font-weight: bold; }
        .red-text { color: #ff4d4d; font-weight: bold; }
    </style>
</head>

                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Asset</th>
                                    <th>Type</th>
                                    <th>Execution Basis</th>
                                    <th>Volume</th>
