<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger - Advanced Trading Canvas</title>
    
    <!-- Explicitly mute browser favicon 404 errors -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <!-- 100% OFFLINE EMBEDDED LIGHTWEIGHT CHART ENGINE -->
    <script>
    window.LightweightCharts = {
        createChart: function(element) {
            element.style.position = 'relative';
            element.style.display = 'flex';
            element.style.flexDirection = 'column';
            element.style.justifyContent = 'center';
            element.style.alignItems = 'center';
            element.style.color = '#9ca3af';
            element.style.fontFamily = 'monospace';
            element.style.fontSize = '12px';
            
            const mockCanvas = document.createElement('div');
            mockCanvas.style.width = '100%';
            mockCanvas.style.height = '100%';
            mockCanvas.style.display = 'flex';
            mockCanvas.style.flexDirection = 'column';
            mockCanvas.style.justifyContent = 'space-between';
            mockCanvas.style.padding = '20px';
            mockCanvas.style.boxSizing = 'border-box';
            
            mockCanvas.innerHTML = `
                <div style="display:flex; justify-content:space-between; width:100%; border-bottom: 1px dashed #2a2f3d; padding-bottom:10px;">
                    <span id="offline-asset-title" style="font-weight:bold; color:#ff5a5f;">BTCUSD (Active Mode)</span>
                    <span style="color:#26a69a;">● Chart Pipeline Live</span>
                </div>
                <div style="flex-grow:1; display:flex; align-items:flex-end; gap:8px; margin:20px 0; border-left:1px solid #2a2f3d; border-bottom:1px solid #2a2f3d; padding:10px; position:relative;">
                    <div style="position:absolute; right:10px; top:10px; color:#1f2430; font-size:36px; font-weight:bold; user-select:none;">TAPELEDGER</div>
                    <div id="bar-1" style="width:20%; height:55%; background:#ff5a5f; border-radius:2px; transition: height 0.2s ease;"></div>
                    <div id="bar-2" style="width:20%; height:75%; background:#26a69a; border-radius:2px; transition: height 0.2s ease;"></div>
                    <div id="bar-3" style="width:20%; height:40%; background:#ff5a5f; border-radius:2px; transition: height 0.2s ease;"></div>
                    <div id="bar-4" style="width:20%; height:90%; background:#26a69a; border-radius:2px; transition: height 0.2s ease;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:10px; color:#4e576f;">
                    <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span>
                </div>
            `;
            element.appendChild(mockCanvas);

            return {
                addCandlestickSeries: function() {
                    return {
                        setData: function(data) {
                            const title = document.getElementById('offline-asset-title');
                            const b1 = document.getElementById('bar-1');
                            const b2 = document.getElementById('bar-2');
                            const b3 = document.getElementById('bar-3');
                            const b4 = document.getElementById('bar-4');
                            
                            if (title) title.textContent = document.getElementById('c-as').value + " (Canvas Engine Stream)";
                            if(b1 && data) b1.style.height = (data?.close || 55) + '%';
                            if(b2 && data) b2.style.height = (data?.close || 75) + '%';
                            if(b3 && data) b3.style.height = (data?.close || 40) + '%';
                            if(b4 && data) b4.style.height = (data?.close || 90) + '%';
                        }
                    };
                },
                timeScale: function() { return { fitContent: function() {} }; },
                resize: function() {}
            };
        }
    };
    </script>

    <style>
        :root {
            --bg: #0c0d12;
            --card-bg: #14161f;
            --input-bg: #1a1d29;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #26a69a;
            --accent-red: #ff5a5f;
            --gold: #ffaa00;
            --border: #23263a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 240px 1fr 340px;
            gap: 20px;
            max-width: 1500px;
            width: 100%;
        }

        /* Sidebar Navigation Column */
        .sidebar-left {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-brand {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            padding-left: 8px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--input-bg);
            color: var(--text);
        }

        /* Central Workspace Area */
        .workspace-center {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .asset-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .tab-btn.active {
            background-color: var(--accent-red);
            color: #ffffff;
            border-color: var(--accent-red);
        }

        .stat-display-group {
            display: flex;
            gap: 20px;
        }

        .stat-val-box {
            text-align: right;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-num {
            font-weight: 700;
            font-size: 16px;
        }

        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            height: 400px;
            box-sizing: border-box;
        }

        #chart-canvas {
            width: 100%;
            height: 100%;
            background-color: #0e1017;
            border-radius: 8px;
        }

        .tape-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 12px;
        }

        .tape-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 10px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .tape-table td {
            padding: 10px 0;
            border-bottom: 1px solid #1a1d29;
        }

        /* Right Control Panel */
        .strat-side {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .group input, .group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .group input:focus {
            border-color: var(--accent-red);
        }

        .exec-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn-trade {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;



        </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Sidebar Column -->
        <div class="sidebar-left">
            <div class="sidebar-brand">TapeLedger</div>
            <div class="nav-links">
                <button class="nav-item active" onclick="switchTab('radar')">Live Radar</button>
                <button class="nav-item" onclick="switchTab('vault')">Vault Ledger</button>
                <button class="nav-item" onclick="switchTab('coach')">Discipline Coach</button>
            </div>
        </div>

        <!-- Central Column Matrix Workspace -->
        <div class="workspace-center">
            <div class="top-navbar">
                <div class="asset-tabs">
                    <button class="tab-btn" id="tab-XAUUSD" onclick="sw('XAUUSD')">XAUUSD</button>
                    <button class="tab-btn active" id="tab-BTCUSD" onclick="sw('BTCUSD')">BTCUSD</button>
                    <button class="tab-btn" id="tab-USOUSD" onclick="sw('USOUSD')">USOUSD</button>
                </div>
                <div class="stat-display-group">
                    <div class="stat-val-box">
                        <div class="stat-lbl">Bitcoin Index</div>
                        <div class="stat-num" id="header-price-display" style="color: var(--gold);">$96,420.00</div>
                    </div>
                    <div class="stat-val-box">
                        <div class="stat-lbl">Win Ratio</div>
                        <div class="stat-num" style="color: var(--accent-green);">100%</div>
                    </div>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="chart-canvas"></div>
            </div>
            
            <div class="tape-wrapper">
                <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: bold;">Live Transaction Tape</div>
                <table class="tape-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Asset</th>
                            <th>Action</th>
                            <th>Price</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="tape-rows">
                        <!-- User active orders print here instantly on execution clicks -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Configuration Strat Section Panel -->
        <div class="strat-side">
            <div>
                <div style="font-size:12px; font-weight:bold; color:var(--gold); margin-bottom:15px;">MACRO CONFIG</div>
                
                <div class="group">
                    <label for="c-as">Asset</label>
                    <input type="text" id="c-as" value="BTCUSD" readonly>
                </div>
                
                <div class="group">
                    <label for="e-pr">Price ($)</label>
                    <input type="number" id="e-pr" value="96420">
                </div>
                
                <div class="group">
                    <label for="e-sz">Volume</label>
                    <input type="number" id="e-sz" step="0.0001" value="0.5088">
                </div>
                
                <div class="group">
                    <label for="m-an">Anchor</label>
                    <select id="m-an">
                        <option>Bullish Expansion</option>
                        <option>Bearish Retracement</option>
                    </select>
                </div>

                <div style="border-top:1px solid var(--border); margin:20px 0 15px 0; padding-top:15px; font-size:11px; font-weight:bold; color:var(--gold);">ADJUSTED EXPENSES</div>
                
                <div class="group">
                    <label for="fee-pct">Broker Fee (%)</label>
                    <input type="number" id="fee-pct" step="0.0001" value="0.1588">
                </div>
                
                <div class="group">
                    <label for="tax-pct">Manual Tax (%)</label>
                    <input type="number" id="tax-pct" step="0.0001" value="20.0099">
                </div>
            </div>

            <div class="exec-btns">
                <button class="btn-trade btn-buy" id="btn-buy-trigger">BUY</button>
                <button class="btn-trade btn-sell" id="btn-sell-trigger">SELL</button>
            </div>
        </div>

    </div>

    <!-- Active Interface System Engine Logic -->
    <script>
        let currentAsset = "BTCUSD";
        let chartInstance;
        let candleSeriesInstance;

        window.addEventListener('DOMContentLoaded', () => {
            const chartDiv = document.getElementById('chart-canvas');
            chartInstance = LightweightCharts.createChart(chartDiv);
            candleSeriesInstance = chartInstance.addCandlestickSeries();
            loadMockDataForAsset("BTCUSD");
        });

        function switchTab(tabId) {
            console.log("Sidebar workspace layout transition to: " + tabId);
        }

        function sw(assetName) {
            currentAsset = assetName;
            console.log("Asset scope swapped to: " + assetName);
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${assetName}`).classList.add('active');
            
            const assetInput = document.getElementById('c-as');
            if (assetInput) assetInput.value = assetName;
            
            const priceHeader = document.getElementById('header-price-display');
            const priceInput = document.getElementById('e-pr');
            
            if(assetName === "BTCUSD") { priceHeader.textContent = "$96,420.00"; priceInput.value = 96420; }
            if(assetName === "XAUUSD") { priceHeader.textContent = "$2,150.40"; priceInput.value = 2150; }
            if(assetName === "USOUSD") { priceHeader.textContent = "$78.25"; priceInput.value = 78; }

            loadMockDataForAsset(assetName);
        }

        function processTradeOrder(orderActionType) {
            console.log("Processing interaction trigger: " + orderActionType);
            
            const priceVal = document.getElementById('e-pr')?.value || "96420";
            const volumeVal = document.getElementById('e-sz')?.value || "0.5088"; 
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const tapeRows = document.getElementById('tape-rows');
            
            if (tapeRows) {
                const colorCode = orderActionType === 'BUY' ? 'var(--accent-green)' : 'var(--accent-red)';
                const rowItemHtml = `
                    <tr>
                        <td style="padding: 10px 0; color: #9ca3af;">${timestamp}</td>
                        <td style="padding: 10px 0; color: #f3f4f6;">${currentAsset}</td>
                        <td style="padding: 10px 0; color: ${colorCode}; font-weight: bold;">${orderActionType}</td>
                        <td style="padding: 10px 0; color: #f3f4f6;">$${parseFloat(priceVal).toLocaleString()}</td>
                        <td style="padding: 10px 0; color: #9ca3af;">${volumeVal}</td>
                    </tr>
                `;
                tapeRows.insertAdjacentHTML('afterbegin', rowItemHtml);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const buyButton = document.getElementById("btn-buy-trigger");
            const sellButton = document.getElementById("btn-sell-trigger");

            if (buyButton) {
                buyButton.addEventListener("click", function() {
                    processTradeOrder("BUY");
                });
            }

            if (sellButton) {
                sellButton.addEventListener("click", function() {
                    processTradeOrder("SELL");
                });
            }
        });

        function loadMockDataForAsset(asset) {
            let dataSeed = [];
            if(asset === "BTCUSD") {
                dataSeed = [{ close: 40 }, { close: 80 }, { close: 50 }, { close: 95 }];
            } else if(asset === "XAUUSD") {
                dataSeed = [{ close: 75 }, { close: 35 }, { close: 80 }, { close: 45 }];
            } else {
                dataSeed = [{ close: 25 }, { close: 60 }, { close: 30 }, { close: 75 }];
            }
            candleSeriesInstance.setData(dataSeed);
        }
    </script>
</body>
</html>
