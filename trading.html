    <!-- REPLACE YOUR BOTTOM SCRIPT BLOCK WITH THIS PERSISTENCE ENHANCED ENGINE -->
    <script>
        let currentAsset = "BTCUSD";
        let chartInstance;
        let candleSeriesInstance;

        // Initialize Standalone Charting Mechanics on Window Mount
        window.addEventListener('DOMContentLoaded', () => {
            const chartDiv = document.getElementById('chart-canvas');
            chartInstance = LightweightCharts.createChart(chartDiv);
            candleSeriesInstance = chartInstance.addCandlestickSeries();
            loadMockDataForAsset("BTCUSD");
            
            // Critical Addition: Reconstruct historical transaction logs on canvas boot
            loadSavedTransactionsFromStorage();
        });

        function switchTab(tabId) {
            console.log("Sidebar workspace layout transition to: " + tabId);
        }

        function sw(assetName) {
            currentAsset = assetName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${assetName}`).classList.add('active');
            const assetInput = document.getElementById('c-as');
            if (assetInput) assetInput.value = assetName;
            const priceHeader = document.getElementById('header-price-display');
            const priceInput = document.getElementById('e-pr');
            if(assetName === "BTCUSD") { priceHeader.textContent = "$96,420.00"; priceInput.value = 96420; }
            if(assetName === "XAUUSD") { priceHeader.textContent = "$2,150.40"; priceInput.value = 2150; }
            if(assetName === "USOUSD") { priceHeader.textContent = "$78.25"; priceInput.value = 78; }
            loadMockDataForAsset(assetName);
        }

        function processTradeOrder(orderActionType) {
            const priceVal = document.getElementById('e-pr')?.value || "96420";
            const volumeVal = document.getElementById('e-sz')?.value || "0.5088"; 
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // 1. Pack individual transaction object metrics together
            const transactionRecord = {
                time: timestamp,
                asset: currentAsset,
                action: orderActionType,
                price: parseFloat(priceVal),
                size: volumeVal
            };

            // 2. Persist order items inside the browser storage array pipeline
            saveTransactionToLocalStorage(transactionRecord);

            // 3. Render structural log line onto your visible table interface
            renderSingleTapeRow(transactionRecord);
        }

        // Logic framework helper to render individual rows on click or initial system load
        function renderSingleTapeRow(record) {
            const tapeRows = document.getElementById('tape-rows');
            if (tapeRows) {
                const colorCode = record.action === 'BUY' ? 'var(--accent-green)' : 'var(--accent-red)';
                const rowItemHtml = `
                    <tr>
                        <td style="padding: 10px 0; color: #9ca3af;">${record.time}</td>
                        <td style="padding: 10px 0; color: #f3f4f6;">${record.asset}</td>
                        <td style="padding: 10px 0; color: ${colorCode}; font-weight: bold;">${record.action}</td>
                        <td style="padding: 10px 0; color: #f3f4f6;">$${record.price.toLocaleString()}</td>
                        <td style="padding: 10px 0; color: #9ca3af;">${record.size}</td>
                    </tr>
                `;
                tapeRows.insertAdjacentHTML('afterbegin', rowItemHtml);
            }
        }

        // Commits individual payloads to hardware memory structures cleanly
        function saveTransactionToLocalStorage(record) {
            let history = JSON.parse(localStorage.getItem('tapeledger_history')) || [];
            history.push(record);
            localStorage.setItem('tapeledger_history', JSON.stringify(history));
        }

        // Extracts all array indexes on system mount sequence to paint data
        function loadSavedTransactionsFromStorage() {
            const history = JSON.parse(localStorage.getItem('tapeledger_history')) || [];
            const tapeRows = document.getElementById('tape-rows');
            if (tapeRows) tapeRows.innerHTML = ''; // Wipe existing temporary items clear
            
            // Loop through stored data and append lines cleanly to matrix stack
            history.forEach(record => {
                renderSingleTapeRow(record);
            });
        }

        document.addEventListener("DOMContentLoaded", function() {
            const buyButton = document.getElementById("btn-buy-trigger");
            const sellButton = document.getElementById("btn-sell-trigger");
            if (buyButton) { buyButton.addEventListener("click", function() { processTradeOrder("BUY"); }); }
            if (sellButton) { sellButton.addEventListener("click", function() { processTradeOrder("SELL"); }); }
        });

        function loadMockDataForAsset(asset) {
            let dataSeed = [];
            if(asset === "BTCUSD") {
                dataSeed = [{ close: 40 }, { close: 80 }, { close: 50 }, { close: 95 }];
            } else if(asset === "XAUUSD") {
                dataSeed = [{ close: 75 }, { close: 35 }, { close: 80 }, { close: 45 }];
            } else {
                dataSeed = [{ close: 25 }, { close: 60 }, { close: 30 }, { close: 75 }];
            }
            candleSeriesInstance.setData(dataSeed);
        }
    </script>
