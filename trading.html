 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger Workspace</title>
    <style>
        :root { --bg: #0c0c0e; --side: #131419; --gold: #d4af37; --red: #ce380f; --green: #1c752b; --text: #afbada; --card: #1d2032; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; background: var(--side); border-right: 1px solid #23263a; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 18px; color: var(--gold); margin-bottom: 25px; }
        .nav-item { padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .nav-item.active, .nav-item:hover { background: var(--card); color: #fff; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-x: auto; }
        .top-dash { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; min-width: 750px; }
        .asset-btn { background: #1c1c1f; border: 1px solid #2d3340; color: #fff; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 5px; }
        .asset-btn.active { background: var(--red); border-color: var(--red); }
        .metrics { display: flex; gap: 10px; }
        .card { background: var(--card); padding: 10px 15px; border-radius: 6px; text-align: center; border: 1px solid #23263a; }
        .val { font-size: 18px; font-weight: bold; }
        .grid { display: flex; gap: 20px; flex: 1; min-height: 0; min-width: 750px; }
        .chart-win { flex: 2; background: #131419; border-radius: 8px; border: 1px solid #23263a; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .chart-container { width: 100%; height: 300px; border-radius: 6px; overflow: hidden; background: #000; border: 1px solid #23263a; flex-shrink: 0; }
        .strat-side { width: 260px; background: var(--side); border-radius: 8px; border: 1px solid #23263a; padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 6px; color: #fff; }
        input, select { width: 100%; background: var(--card); border: 1px solid #23263a; color: #fff; padding: 8px; border-radius: 6px; box-sizing: border-box; }
        .exec-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-buy { background: var(--green); } .btn-sell { background: var(--red); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-size: 11px; color: #616e88; padding: 6px; border-bottom: 1px solid #23263a; }
        td { padding: 8px 6px; border-bottom: 1px solid #1c1e26; font-size: 12px; font-family: monospace; color: #fff; }
        .scroll { max-height: 120px; overflow-y: auto; background: #0c0d10; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⏱️ TAPELEDGER</div>
        <div class="nav-item active">📡 Live Radar</div>
        <div class="nav-item">🗃️ Vault Ledger</div>
        <div class="nav-item">🧠 Discipline Coach</div>
    </div>
    <div class="main">
        <div class="top-dash">
            <div>
                <button class="asset-btn" id="b-gold" onclick="sw('XAUUSD',2650.40,'Gold','FX:XAUUSD')">XAUUSD</button>
                <button class="asset-btn active" id="b-btc" onclick="sw('BTCUSD',96420.00,'Bitcoin','BINANCE:BTCUSDT')">BTCUSD</button>
                <button class="asset-btn" id="b-oil" onclick="sw('USOUSD',74.25,'Crude Oil','FX:USOIL')">USOUSD</button>
            </div>
            <div class="metrics">
                <div class="card"><div class="val" style="color:var(--gold)" id="t-pr">$96,420.00</div><div style="font-size:10px" id="t-lbl">Bitcoin</div></div>
                <div class="card"><div class="val" style="color:var(--green)">100%</div><div style="font-size:10px">Win Rate</div></div>
            </div>
        </div>
        <div class="grid">
            <div class="chart-win">
                <!-- Embedded Live Charting Display Engine -->
                <div class="chart-container">
                    <iframe id="tv-chart" style="width:100%; height:100%; border:none;" src="https://tradingview.com"></iframe>
                </div>
                <div>
                    <h4 style="margin:0 0 5px 0; font-size:12px; color:#616e88;">LIVE TRANSACTION TAPE</h4>
                    <div class="scroll"><table><thead><tr><th>Time</th><th>Asset</th><th>Action</th><th>Price</th><th>Size</th></tr></thead><tbody id="t-body"></tbody></table></div>
                </div>
                <div>
                    <h4 style="margin:0 0 5px 0; font-size:12px; color:#616e88;">ACCOUNT MASTER LEDGER</h4>
                    <div class="scroll"><table><thead><tr><th>ID</th><th>Asset</th><th>Action</th><th>Price/Anchor</th><th>Size</th></tr></thead><tbody id="l-body"></tbody></table></div>
                </div>
            </div>
            <div class="strat-side">
                <div style="font-size:12px; font-weight:bold; color:var(--gold); margin-bottom:10px;">MACRO CONFIG</div>
                <div class="group"><label>Asset</label><input type="text" id="c-as" value="BTCUSD" readonly></div>
                <div class="group"><label>Price ($)</label><input type="number" id="e-pr" value="96420"></div>
                <div class="group"><label>Volume</label><input type="number" id="e-sz" value="0.50" step="0.01"></div>
                <div class="group"><label>Anchor</label><select id="m-an"><option>Bullish Expansion</option><option>Bearish Retracement</option></select></div>
                <div class="exec-btns">
                    <button class="btn btn-buy" onclick="ex('BUY')">Buy</button>
                    <button class="btn btn-sell" onclick="ex('SELL')">Sell</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let id=5001;
        function sw(sym,pr,lbl,tvSym){
            document.getElementById('c-as').value=sym; document.getElementById('e-pr').value=pr;
            document.getElementById('t-pr').innerText="$"+pr.toLocaleString(); document.getElementById('t-lbl').innerText=lbl;
            document.querySelectorAll('.asset-btn').forEach(b=>b.classList.remove('active'));
            if(sym==='XAUUSD')document.getElementById('b-gold').classList.add('active');
            else if(sym==='BTCUSD')document.getElementById('b-btc').classList.add('active');
            else document.getElementById('b-oil').classList.add('active');
            // Swap chart feed instantly
            document.getElementById('tv-chart').src = `https://tradingview.com{encodeURIComponent(tvSym)}&interval=5&theme=dark&style=1&timezone=Exchange`;
        }
        function ex(act){
            const as=document.getElementById('c-as').value, pr=parseFloat(document.getElementById('e-pr').value).toLocaleString(), sz=document.getElementById('e-sz').value, an=document.getElementById('m-an').value, tm=new Date().toLocaleTimeString(), cl=act==='BUY'?'style="color:#26c281;font-weight:bold;"':'style="color:#ff4d4d;font-weight:bold;"';
            document.getElementById('t-body').insertAdjacentHTML('afterbegin',`<tr><td>${tm}</td><td>${as}</td><td ${cl}>${act}</td><td>$${pr}</td><td>${sz}</td></tr>`);
            document.getElementById('l-body').insertAdjacentHTML('afterbegin',`<tr><td>#${id++}</td><td>${as}</td><td ${cl}>${act}</td><td>$${pr} [${an}]</td><td>${sz}</td></tr>`);
        }
    </script>
</body>
</html>
