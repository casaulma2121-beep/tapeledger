 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger - Trading Canvas</title>
    <!-- Mute the harmless favicon error explicitly -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root {
            --bg: #121214;
            --card-bg: #1a1a1e;
            --input-bg: #222227;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #26a69a;
            --accent-red: #ff5a5f;
            --border: #2a2a30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .top-navbar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .asset-tabs {
            display: flex;
            gap: 10px;
        }
        .tab-btn {
            background-color: #222227;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            background-color: var(--accent-red);
            color: #ffffff;
            border-color: var(--accent-red);
        }
        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 15px;
            height: 380px;
        }
        #chart-canvas {
            width: 100%;
            height: 100%;
            background-color: #121214;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        .tape-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }
        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        .tape-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .tape-table td {
            padding: 8px 0;
            border-bottom: 1px solid #222227;
        }
        .control-panel-right {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
        }
        .input-group input, .input-group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .btn-trade {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;
        }
        .btn-buy { background-color: var(--accent-green); }
        .btn-sell { background-color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Top Asset Switcher Bar -->
        <div class="top-navbar">
            <div class="asset-tabs">
                <button class="tab-btn" id="tab-XAUUSD" onclick="sw('XAUUSD')">XAUUSD</button>
                <button class="tab-btn active" id="tab-BTCUSD" onclick="sw('BTCUSD')">BTCUSD</button>
                <button class="tab-btn" id="tab-USOUSD" onclick="sw('USOUSD')">USOUSD</button>
            </div>
            <div style="font-weight: bold; color: #ffaa00;" id="header-price-display">$96,420.00</div>
        </div>

        <!-- Left Column Workspace -->
        <div class="workspace-left">
            <div class="chart-wrapper">
                <div id="chart-canvas">
                    <!-- Standard clear placeholder text inside your custom box -->
                    <span>Chart Loading Engine Initialization Placeholder</span>
                </div>
            </div>
            
            <div class="tape-wrapper">
                <div style="font-size: 12px; color: var(--text-muted); font-weight: bold; text-transform: uppercase;">Live Transaction Tape</div>
                <table class="tape-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Asset</th>
                            <th>Action</th>
                            <th>Price</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="tape-rows">
                        <!-- User transactions will list here dynamically on click -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Side Control Matrix -->
        <div class="control-panel-right">
            <p style="font-size: 11px; text-transform: uppercase; color: var(--accent-red); font-weight: bold; margin: 0;">Macro Config</p>
            
            <div class="input-group">
                <label>Asset</label>
                <input type="text" id="input-asset" value="BTCUSD" readonly>
            </div>
            <div class="input-group">
                <label>Price ($)</label>
                <input type="number" id="input-price" value="96420">
            </div>
            <div class="input-group">
                <label>Volume</label>
                <input type="number" id="input-volume" step="0.0001" value="0.5088">
            </div>
            <div class="input-group">
                <label>Anchor</label>
                <select id="input-anchor">
                    <option>Bullish Expansion</option>
                    <option>Bearish Compression</option>
                </select>
            </div>

            <p style="font-size: 11px; text-transform: uppercase; color: #ffaa00; font-weight: bold; margin: 10px 0 0 0;">Adjusted Expenses</p>
            <div class="input-group">
                <label>Broker Fee (%)</label>
                <input type="number" id="input-fee" value="0.1588" step="0.0001">
            </div>
            <div class="input-group">
                <label>Manual Tax (%)</label>
                <input type="number" id="input-tax" value="20.0099" step="0.0001">
            </div>

            <div class="action-buttons">
                <!-- Mapped exactly to the JavaScript ex() function below -->
                <button class="btn-trade btn-buy" onclick="ex('BUY')">BUY</button>
                <button class="btn-trade btn-sell" onclick="ex('SELL')">SELL</button>
            </div>
        </div>

    </div>

    <!-- CLEAN REVISED JAVASCRIPT BLOCK ATTACHED DIRECTLY TO INTERACTIVE ELEMENTS -->
    <script>
        // 1. REVISION: sw() catches asset tab switches and updates form fields smoothly
        function sw(assetName) {
            console.log("Switching UI asset layout environment to: " + assetName);
            
            // Toggle highlight styles across navigation items
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const selectedTab = document.getElementById(`tab-${assetName}`);
            if (selectedTab) selectedTab.classList.add('active');
            
            // Force values into form fields
            document.getElementById('input-asset').value = assetName;
            
            // Adjust local visual numbers depending on choice
            const priceHeader = document.getElementById('header-price-display');
            const priceInput = document.getElementById('input-price');
            
            if (assetName === 'BTCUSD') {
                priceHeader.textContent = "$96,420.00";
                priceInput.value = 96420;
            } else if (assetName === 'XAUUSD') {
                priceHeader.textContent = "$2,150.40";
                priceInput.value = 2150;
            } else if (assetName === 'USOUSD') {
                priceHeader.textContent = "$78.25";
                priceInput.value = 78;
            }
        }

            console.log("Order Action executed: " + orderActionType);
