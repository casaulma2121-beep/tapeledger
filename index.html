<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapeLedger - Advanced Trading Canvas</title>
    
    <!-- Standalone Charting Framework -->
    <script src="https://unpkg.com"></script>

    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #161920;
            --input-bg: #1f2430;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #00b074;
            --accent-red: #ff5a5f;
            --border: #2a2f3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .top-navbar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .asset-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background-color: #1a1e26;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .tab-btn.active {
            background-color: var(--accent-red);
            color: #ffffff;
            border-color: var(--accent-red);
        }

        .live-stats {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-val {
            font-weight: 700;
            font-size: 18px;
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 15px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        #chart-canvas {
            width: 100%;
            height: 350px;
            background-color: #12141a;
            border-radius: 6px;
        }

        .tape-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .tape-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .tape-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 8px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .tape-table td {
            padding: 8px 0;
            border-bottom: 1px solid #1c202b;
        }

        .control-panel-right {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 480px;
            box-sizing: border-box;
        }

        .panel-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-red);
            font-weight: 700;
            margin: 0 0 15px 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .input-group input, .input-group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent-red);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn-trade {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;
            transition: opacity 0.1s ease;
        }

        .btn-trade:hover {
            opacity: 0.9;
        }

        .btn-buy { background-color: var(--accent-green); }
        .btn-sell { background-color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Top Asset Switcher Row -->
        <div class="top-navbar">
            <div class="asset-tabs">
                <button class="tab-btn" id="tab-XAUUSD" onclick="sw('XAUUSD')">XAUUSD</button>
                <button class="tab-btn active" id="tab-BTCUSD" onclick="sw('BTCUSD')">BTCUSD</button>
                <button class="tab-btn" id="tab-USOUSD" onclick="sw('USOUSD')">USOUSD</button>
            </div>
            <div class="live-stats">
                <div class="stat-box">
                    <div style="font-size: 11px; color: var(--text-muted);">Active Feed Price</div>
                    <div class="stat-val" id="header-price-display" style="color: #ffaa00;">$96,420.00</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 11px; color: var(--text-muted);">Win Rate</div>
                    <div class="stat-val" style="color: var(--accent-green);">100%</div>
                </div>
            </div>
        </div>

        <!-- Left Side Workspace -->
        <div class="workspace-left">
            <div class="chart-wrapper">
                <div id="chart-canvas"></div>
            </div>
            
            <div class="tape-wrapper">
                <div class="tape-title">Live Transaction Tape</div>
                <table class="tape-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Asset</th>
                            <th>Action</th>
                            <th>Price</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="tape-rows">
                        <!-- Click actions will print logs directly here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Side Control Matrix (Cleaned Up Config Only) -->
        <div class="control-panel-right">
            <div>
                <p class="panel-section-title">Macro Config</p>
                
                <div class="input-group">
                    <label>Asset</label>
                    <input type="text" id="input-asset" value="BTCUSD" readonly>
                </div>
                
                <div class="input-group">
                    <label>Price ($)</label>
                    <input type="number" id="input-price" value="96420">
                </div>
                
                <div class="input-group">
                    <label>Volume</label>
                    <input type="number" id="input-volume" step="0.0001" value="0.5088">
                </div>
                
                <div class="input-group">
                    <label>Anchor</label>
                    <select>
                        <option>Bullish Expansion</option>
                        <option>Bearish Compression</option>
                    </select>
                </div>
            </div>

            <!-- Execution triggers cleanly map to scripts without any tax blocks -->
            <div class="action-buttons">
                <button class="btn-trade btn-buy" onclick="ex('BUY')">BUY</button>
                <button class="btn-trade btn-sell" onclick="ex('SELL')">SELL</button>
            </div>
        </div>

    </div>

    <script>
        let currentActiveAsset = "BTCUSD";
        let chartInstance;
        let candleSeriesInstance;

        window.addEventListener('DOMContentLoaded', () => {
            const chartDiv = document.getElementById('chart-canvas');
            
            chartInstance = LightweightCharts.createChart(chartDiv, {
                width: chartDiv.clientWidth,
                height: 350,
                layout: { background: { color: '#12141a' }, textColor: '#9ca3af' },
                grid: { vertLines: { color: '#1f2430' }, horzLines: { color: '#1f2430' } },
                timeScale: { borderColor: '#2a2f3d' }
            });

            candleSeriesInstance = chartInstance.addCandlestickSeries({
                upColor: '#00b074', downColor: '#ff5a5f',
                borderVisible: false, wickUpColor: '#00b074', wickDownColor: '#ff5a5f'
            });

            loadMockDataForAsset("BTCUSD");
