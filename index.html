<head>

    <script src="https://unpkg.com"></script>

    <style>
        :root {

        body {

            margin: 0;

            display: flex;
            justify-content: center;

        }
        .container {
            background-color: var(--card-bg);

            width: 100%;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);

        .logo-container {

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0;

        }
        .tagline {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .features-list {
            text-align: left;
            margin: 0 auto 30px auto;
            padding: 0;
            list-style: none;
            max-width: 320px;
        }
        .features-list li {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .features-list li::before {
            content: "✓";
            color: var(--accent);
            font-weight: bold;
            margin-right: 10px;
            font-size: 16px;
        }
        .gumroad-button {
            display: block;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 28px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255, 90, 95, 0.2);
            width: 100%;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }
        .gumroad-button:hover {
            background-color: var(--accent-hover);
        }
        .gumroad-button:active {
            transform: scale(0.98);
        }

        /* Chart container styling hidden by default */
        #chart-zone {
            margin-top: 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a30;
            display: none; 
            background-color: #1a1a1e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">📼</div>
        <h1>TapeLedger</h1>
        <p class="tagline">The direct, transparent tool built precisely for your workflow needs. No subscriptions, no fluff.</p>
        <ul class="features-list">
            <li>100% cloud-hosted deployment</li>
            <li>Instant interaction canvas</li>
            <li>Zero platform middleman fees</li>
        </ul>
        
        <!-- Active Action Trading Button -->
        <button class="gumroad-button" id="toggle-chart-btn">Activate Canvas Chart</button>

        <!-- Node where the chart engine will render dynamically -->
        <div id="chart-zone"></div>
    </div>

    <script>
        const chartBtn = document.getElementById('toggle-chart-btn');
        const chartZone = document.getElementById('chart-zone');
        let chartInitialized = false;

        chartBtn.addEventListener('click', () => {
            // Unveil the layout node container instantly on click
            chartZone.style.display = 'block';
            chartBtn.textContent = 'Refreshing Data Stream...';

            if (!chartInitialized) {
                // Initialize trading layout mechanics
                const chart = LightweightCharts.createChart(chartZone, {
                    width: chartZone.clientWidth || 400,
                    height: 240,
                    layout: {
                        background: { color: '#1a1a1e' },
                        textColor: '#9ca3af',
                    },
                    grid: {
                        vertLines: { color: '#2a2a30' },
                        horzLines: { color: '#2a2a30' },
                    },
                });

                // Add an asset candlestick tracking stream
                const candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a', downColor: '#ef5350',
                    borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350'
                });

                // Populate with sample market ledger open/close test data 
                candlestickSeries.setData([
                    { time: '2026-07-01', open: 100, high: 105, low: 98, close: 103 },
                    { time: '2026-07-02', open: 103, high: 106, low: 102, close: 105 },
                    { time: '2026-07-03', open: 105, high: 110, low: 104, close: 108 },
                    { time: '2026-07-04', open: 108, high: 109, low: 101, close: 102 },
                    { time: '2026-07-05', open: 102, high: 115, low: 102, close: 112 },
                ]);

                chart.timeScale().fitContent();
                chartInitialized = true;
                chartBtn.textContent = 'Chart Live';
            }
        });
    </script>
</body>
</html>
