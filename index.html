    <script>
        let currentAsset = "BTCUSD";

        function switchTab(tabId) {
            console.log("Sidebar navigation to: " + tabId);
        }

        function sw(assetName) {
            currentAsset = assetName;
            console.log("Asset changed to: " + assetName);
            
            // Sync values into the "Asset" text field input automatically
            const assetInput = document.getElementById('input-asset') || document.querySelector('input[value="BTCUSD"]');
            if (assetInput) assetInput.value = assetName;
        }

        function ex(orderActionType) {
            console.log("Order executed: " + orderActionType);
            
            const priceVal = document.getElementById('input-price')?.value || "96420";
            const volumeVal = document.getElementById('input-volume')?.value || "0.5088"; 
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const tapeRows = document.getElementById('tape-rows') || document.querySelector('.tape-table tbody');
            
            if (tapeRows) {
                const colorCode = orderActionType === 'BUY' ? '#26a69a' : '#ff5a5f';
                const rowItemHtml = `
                    <tr style="border-bottom: 1px solid #1a1e26;">
                        <td style="padding: 8px 0; color: #9ca3af;">${timestamp}</td>
                        <td style="padding: 8px 0; color: #f3f4f6;">${currentAsset}</td>
                        <td style="padding: 8px 0; color: ${colorCode}; font-weight: bold;">${orderActionType}</td>
                        <td style="padding: 8px 0; color: #f3f4f6;">$${parseFloat(priceVal).toLocaleString()}</td>
                        <td style="padding: 8px 0; color: #9ca3af;">${volumeVal}</td>
                    </tr>
                `;
                tapeRows.insertAdjacentHTML('afterbegin', rowItemHtml);
            }
        }
    </script>
</body>
</html>
