    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #161920;
            --input-bg: #1f2430;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #00b074;
            --accent-red: #ff5a5f;
            --border: #2a2f3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .top-navbar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .asset-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background-color: #1a1e26;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .tab-btn.active {
            background-color: var(--accent-red);
            color: #ffffff;
            border-color: var(--accent-red);
        }

        .live-stats {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-val {
            font-weight: 700;
            font-size: 18px;
        }

        .workspace-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 15px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        #chart-canvas {
            width: 100%;
            height: 350px;
            background-color: #12141a;
            border-radius: 6px;
        }

        .tape-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .tape-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .tape-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 8px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .tape-table td {
            padding: 8px 0;
            border-bottom: 1px solid #1c202b;
        }

        .control-panel-right {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 520px;
            box-sizing: border-box;
        }

        .panel-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-red);
            font-weight: 700;
            margin: 0 0 15px 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .input-group input, .input-group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
